backend:
  name: github
  repo: davidhullster/davidhullster.github.io
  branch: master
  base_url: https://auth.static-cms.com # Keeping this as a placeholder
local_backend: true

media_folder: "public/img" # Media files will be stored in the public/img folder
public_folder: "/img" # The src attribute for images in Markdown

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
